run:
  name: openclaw-mimic-real-run
  paper_path: papers/MIMIC.md
  doi: 10.1038/s41598-024-75050-8
  dataset: MIMIC-IV v2.2
  dry_run: false
  execution_mode: agentic
  interaction_mode: chat
  task_contract_path: shared/task_contract.json

quality_gates:
  expected_cohort_size: 1742
  cohort_tolerance_percent: 10
  max_fail_metrics: 25

targets: []

agents:
  paper_parser_agent:
    enabled: true
  study_design_agent:
    enabled: true
  cohort_agent:
    enabled: true
  feature_agent:
    enabled: true
  stats_agent:
    enabled: true
  figure_agent:
    enabled: true
  verify_agent:
    enabled: true
  report_agent:
    enabled: true

llm:
  provider: siliconflow
  base_url: https://api.siliconflow.cn/v1
  default_model: deepseek-ai/DeepSeek-V3
  api_key_env: SILICONFLOW_API_KEY
  temperature: 0.0
  max_tokens: 4000
  timeout_seconds: 60
  enabled: true

agent_routes:
  paper_parser_agent:
    enabled: true
    provider: siliconflow
    model: deepseek-ai/DeepSeek-V3
    allowed_skills:
      - paper_intake_and_contract
  study_design_agent:
    enabled: true
    provider: siliconflow
    model: deepseek-ai/DeepSeek-V3
    allowed_skills:
      - paper_intake_and_contract
      - paper_alignment_verification
  cohort_agent:
    enabled: true
    provider: deterministic
    model: local-sql-blueprint
    allowed_skills:
      - mimic_cohort_execution
    tool_boundary:
      - deterministic_only
  feature_agent:
    enabled: true
    provider: deterministic
    model: local-wide-table-expander
    allowed_skills:
      - analysis_dataset_expansion
      - longitudinal_trajectory_execution
    tool_boundary:
      - deterministic_only
  stats_agent:
    enabled: true
    provider: deterministic
    model: local-survival-stats
    allowed_skills:
      - longitudinal_trajectory_execution
      - survival_stats_execution
    tool_boundary:
      - deterministic_only
  figure_agent:
    enabled: true
    provider: deterministic
    model: local-artifact-compiler
    allowed_skills:
      - result_figure_generation
    tool_boundary:
      - deterministic_only
  verify_agent:
    enabled: true
    provider: siliconflow
    model: deepseek-ai/DeepSeek-V3
    allowed_skills:
      - paper_alignment_verification
  report_agent:
    enabled: true
    provider: siliconflow
    model: deepseek-ai/DeepSeek-V3
    allowed_skills:
      - paper_alignment_verification

skill_registry:
  external: {}
  local:
    paper_intake_and_contract: openclaw/skills/paper_intake_and_contract/SKILL.md
    mimic_cohort_execution: openclaw/skills/mimic_cohort_execution/SKILL.md
    analysis_dataset_expansion: openclaw/skills/analysis_dataset_expansion/SKILL.md
    longitudinal_trajectory_execution: openclaw/skills/longitudinal_trajectory_execution/SKILL.md
    survival_stats_execution: openclaw/skills/survival_stats_execution/SKILL.md
    result_figure_generation: openclaw/skills/result_figure_generation/SKILL.md
    paper_alignment_verification: openclaw/skills/paper_alignment_verification/SKILL.md
  agent_skill_map: {}
  fallback_behavior: warn

dataset_adapters:
  default_adapter: mimic_iv
  adapters:
    mimic_iv:
      source_type: postgres
      schemas:
        - mimiciv_hosp
        - mimiciv_icu
        - mimiciv_derived

artifact_policy:
  shared_dir: shared
  results_dir: results
  session_root: shared/sessions
  write_agent_runs: true
  write_task_contract: true

verification_policy:
  compare_targets: true
  enable_alignment_diagnostics: true
  stop_on_fail: false
  max_missing_metrics: 10
