run:
  name: generic-paper-repro
  paper_path: papers/paper.md
  doi: unknown
  dataset: MIMIC-IV v2.2
  dry_run: true
  execution_mode: agentic
  interaction_mode: chat
  task_contract_path: shared/task_contract.json

quality_gates:
  expected_cohort_size: 0
  cohort_tolerance_percent: 5
  max_fail_metrics: 2

targets: []

agents:
  paper_parser_agent:
    enabled: true
  study_design_agent:
    enabled: true
  cohort_agent:
    enabled: true
  feature_agent:
    enabled: true
  stats_agent:
    enabled: true
  figure_agent:
    enabled: true
  verify_agent:
    enabled: true
  report_agent:
    enabled: true
  git_update_agent:
    enabled: false

llm:
  provider: siliconflow
  base_url: https://api.siliconflow.cn/v1
  default_model: deepseek-ai/DeepSeek-V3
  api_key_env: SILICONFLOW_API_KEY
  temperature: 0.0
  max_tokens: 4000
  timeout_seconds: 60
  enabled: true

agent_routes:
  paper_parser_agent:
    enabled: true
  study_design_agent:
    enabled: true
  cohort_agent:
    enabled: true
  feature_agent:
    enabled: true
  stats_agent:
    enabled: true
  figure_agent:
    enabled: true
  verify_agent:
    enabled: true
  report_agent:
    enabled: true
  git_update_agent:
    enabled: false

skill_registry:
  external: {}
  local: {}
  agent_skill_map: {}
  fallback_behavior: warn

dataset_adapters:
  default_adapter: mimic_iv
  adapters:
    mimic_iv:
      source_type: postgres
      schemas:
        - mimiciv_hosp
        - mimiciv_icu
        - mimiciv_derived

artifact_policy:
  shared_dir: shared
  results_dir: results
  session_root: shared/sessions
  write_agent_runs: true
  write_task_contract: true

verification_policy:
  compare_targets: true
  enable_alignment_diagnostics: true
  stop_on_fail: true
  max_missing_metrics: 0
