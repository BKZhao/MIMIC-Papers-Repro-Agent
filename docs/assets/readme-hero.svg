<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 300" role="img" aria-labelledby="title desc">
  <title id="title">MIMIC Clinical Paper Reproduction Agent banner</title>
  <desc id="desc">Minimal decorative banner for the README.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#bfdbfe" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ccfbf1" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#99f6e4" stop-opacity="0.16"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#020617" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1400" height="300" fill="url(#bg)"/>

  <circle cx="120" cy="70" r="120" fill="#ffffff" opacity="0.05"/>
  <circle cx="1280" cy="50" r="140" fill="#67e8f9" opacity="0.08"/>
  <circle cx="1190" cy="270" r="180" fill="#c4b5fd" opacity="0.08"/>

  <rect x="84" y="82" width="330" height="136" rx="30" fill="url(#cardA)" stroke="#e2e8f0" stroke-opacity="0.18" filter="url(#shadow)"/>
  <rect x="536" y="56" width="330" height="188" rx="30" fill="url(#cardB)" stroke="#dbeafe" stroke-opacity="0.22" filter="url(#shadow)"/>
  <rect x="986" y="92" width="330" height="124" rx="30" fill="url(#cardC)" stroke="#ccfbf1" stroke-opacity="0.22" filter="url(#shadow)"/>

  <g transform="translate(128 116)">
    <rect x="0" y="0" width="92" height="14" rx="7" fill="#e0f2fe" opacity="0.88"/>
    <rect x="0" y="28" width="214" height="12" rx="6" fill="#e0f2fe" opacity="0.60"/>
    <rect x="0" y="52" width="178" height="12" rx="6" fill="#e0f2fe" opacity="0.42"/>
    <rect x="0" y="90" width="64" height="18" rx="9" fill="#7dd3fc" opacity="0.75"/>
    <rect x="76" y="90" width="72" height="18" rx="9" fill="#5eead4" opacity="0.75"/>
  </g>

  <g transform="translate(584 94)">
    <rect x="0" y="0" width="92" height="12" rx="6" fill="#ffffff" opacity="0.70"/>
    <rect x="0" y="28" width="236" height="12" rx="6" fill="#ffffff" opacity="0.46"/>
    <rect x="0" y="56" width="236" height="84" rx="20" fill="#ffffff" opacity="0.24"/>
    <path d="M34 112 L80 96 L122 102 L168 76 L216 86" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <circle cx="80" cy="96" r="6" fill="#ffffff"/>
    <circle cx="122" cy="102" r="6" fill="#ffffff"/>
    <circle cx="168" cy="76" r="6" fill="#ffffff"/>
  </g>

  <g transform="translate(1030 124)">
    <rect x="0" y="0" width="84" height="12" rx="6" fill="#ecfeff" opacity="0.76"/>
    <rect x="0" y="28" width="206" height="12" rx="6" fill="#ecfeff" opacity="0.44"/>
    <rect x="0" y="62" width="58" height="40" rx="14" fill="#ecfeff" opacity="0.30"/>
    <rect x="74" y="50" width="58" height="52" rx="14" fill="#ecfeff" opacity="0.38"/>
    <rect x="148" y="36" width="58" height="66" rx="14" fill="#ecfeff" opacity="0.50"/>
  </g>
</svg>
