      <line x1="226" y1="146" x2="362" y2="146"/><circle cx="294" cy="146" r="7"/>
      <line x1="240" y1="178" x2="348" y2="178"/><circle cx="294" cy="178" r="7"/>
      <line x1="214" y1="210" x2="380" y2="210"/><circle cx="298" cy="210" r="7"/>
      <line x1="250" y1="242" x2="350" y2="242"/><circle cx="300" cy="242" r="7"/>
