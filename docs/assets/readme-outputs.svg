    <rect x="32" y="126" width="360" height="14" rx="7" fill="#f1f5f9"/>
    <rect x="32" y="150" width="462" height="14" rx="7" fill="#f1f5f9"/>
    <rect x="32" y="174" width="498" height="14" rx="7" fill="#f1f5f9"/>
    <rect x="32" y="208" width="178" height="54" rx="14" fill="#dbeafe"/>
    <rect x="226" y="208" width="178" height="54" rx="14" fill="#ccfbf1"/>
    <rect x="420" y="208" width="122" height="54" rx="14" fill="#ede9fe"/>
    <text x="121" y="238" text-anchor="middle" fill="#1e3a8a" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="800">cohort gap</text>
    <text x="315" y="238" text-anchor="middle" fill="#115e59" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="800">HR aligned</text>
    <text x="481" y="238" text-anchor="middle" fill="#5b21b6" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="800">RCS mismatch</text>
