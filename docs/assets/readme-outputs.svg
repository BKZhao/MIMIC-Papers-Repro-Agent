      <text x="400" y="150" fill="#334155">1.13 (1.06-1.21)</text>
      <text x="400" y="182" fill="#334155">1.10 (1.04-1.18)</text>
      <text x="400" y="214" fill="#334155">1.17 (1.05-1.29)</text>
      <text x="400" y="246" fill="#334155">1.11 (1.05-1.17)</text>
