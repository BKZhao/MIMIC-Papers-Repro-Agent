      <text x="166" y="106" fill="#0f172a">overall</text>
      <text x="258" y="106" fill="#0f172a">Q1</text>
      <text x="322" y="106" fill="#0f172a">Q2</text>
      <text x="386" y="106" fill="#0f172a">Q3</text>
      <text x="450" y="106" fill="#0f172a">Q4</text>
    </g>
    <g font-family="Segoe UI, Arial, sans-serif" font-size="13">
      <text x="54" y="141" fill="#334155">Age</text>
      <text x="166" y="141" fill="#334155">75.0 (70.0, 82.0)</text>
      <text x="258" y="141" fill="#334155">75.0</text>
      <text x="322" y="141" fill="#334155">75.0</text>
      <text x="386" y="141" fill="#334155">76.0</text>
      <text x="450" y="141" fill="#334155">76.0</text>

