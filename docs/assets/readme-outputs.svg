    <text x="30" y="42" fill="#0f172a" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="800">Baseline Table</text>
    <text x="30" y="68" fill="#475569" font-size="15" font-family="Segoe UI, Arial, sans-serif">CSV / Markdown export</text>
    <rect x="30" y="92" width="500" height="20" rx="10" fill="#e2e8f0"/>
