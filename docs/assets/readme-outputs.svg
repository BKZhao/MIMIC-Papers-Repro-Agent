    <text x="30" y="42" fill="#0f172a" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="800">Reproduction Report</text>
    <text x="30" y="68" fill="#475569" font-size="15" font-family="Segoe UI, Arial, sans-serif">Markdown summary for alignment, metrics, and debugging notes</text>
