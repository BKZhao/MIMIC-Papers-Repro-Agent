<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">Outputs Preview</title>
  <desc id="desc">Preview collage of tables, Kaplan-Meier curves, forest plots, and markdown reports for the README.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#94a3b8" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1400" height="860" fill="url(#bg)"/>
  <text x="700" y="72" text-anchor="middle" fill="#0f172a" font-size="36" font-family="Segoe UI, Arial, sans-serif" font-weight="800">Outputs Preview</text>
  <text x="700" y="108" text-anchor="middle" fill="#475569" font-size="18" font-family="Segoe UI, Arial, sans-serif">Paper-like artifacts exported by the deterministic workflow</text>

